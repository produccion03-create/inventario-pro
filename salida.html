<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salida de mercancía</title>

<link rel="stylesheet" href="CSS/style.css">

</head>


<body>


<div class="app">


<h1>➖ Salida de mercancía</h1>



<div class="panel">


<label>
Producto
</label>


<select id="producto"></select>


<br><br>


<p>
Stock disponible:
<strong id="stockActual">0</strong>
</p>



<label>
Cantidad a retirar
</label>


<input
type="number"
id="cantidad"
min="1"
value="1">


<br><br>


<button id="guardarSalida">

💾 Guardar salida

</button>


</div>



<br>


<button onclick="location.href='index.html'">

⬅ Volver

</button>


</div>




<script type="module" src="JS/salida.js"></script>


</body>

</html>
