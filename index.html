<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventario Pro</title>

<link rel="stylesheet" href="CSS/style.css">

</head>


<body>


<div class="app">


<h1>📦 Inventario Pro</h1>



<div class="dashboard">


    <div class="card card-productos">

        <h3>📦 Productos</h3>

        <span id="totalProductos">0</span>

        <p>Total registrados</p>

    </div>



    <div class="card card-valor">

        <h3>💰 Valor almacén</h3>

        <span id="valorAlmacen">0 €</span>

        <p>Valor actual inventario</p>

    </div>



    <div class="card card-stock">

        <h3>⚠️ Stock bajo</h3>

        <span id="stockBajo">0</span>

        <p>Necesitan revisión</p>

    </div>



    <div class="card card-alerta">

        <h3>🔴 Sin stock</h3>

        <span id="sinStock">0</span>

        <p>Productos agotados</p>

    </div>


</div>




<div class="panel">

    <h2>⚠️ Productos con stock bajo</h2>

    <div id="listaStockBajo">

        Cargando...

    </div>

</div>




<div class="panel">

    <h2>📊 Estadísticas inventario</h2>

    <canvas id="graficoInventario"></canvas>

</div>





<div class="menu">


<button onclick="location.href='productos.html'">
📦 Productos
</button>


<button onclick="location.href='scanner.html'">
📷 Escanear
</button>


<button onclick="location.href='movimientos.html'">
📋 Historial movimientos
</button>


<button onclick="location.href='entrada.html'">
➕ Entrada
</button>


<button>
➖ Salida
</button>


<button>
📊 Informes
</button>


<button>
⚙ Configuración
</button>


</div>



</div>



<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="JS/app.js"></script>

<script type="module" src="JS/dashboard.js"></script>


</body>

</html>
