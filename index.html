<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventario Pro</title>

<link rel="stylesheet" href="CSS/style.css">

</head>


<body>


<div class="app">


<h1>📦 Inventario Pro</h1>



<!-- DASHBOARD -->

<div class="dashboard">


    <div class="card card-productos">

        <h3>📦 Productos</h3>

        <span id="totalProductos">0</span>

        <p>Total registrados</p>

    </div>



    <div class="card card-valor">

        <h3>💰 Valor almacén</h3>

        <span id="valorAlmacen">0 €</span>

        <p>Valor actual inventario</p>

    </div>



    <div class="card card-stock">

        <h3>⚠️ Stock bajo</h3>

        <span id="stockBajo">0</span>

        <p>Necesitan revisión</p>

    </div>



    <div class="card card-alerta">

        <h3>🔴 Sin stock</h3>

        <span id="sinStock">0</span>

        <p>Productos agotados</p>

    </div>


</div>




<!-- ALERTA STOCK -->

<div class="panel">

    <h2>⚠️ Productos con stock bajo</h2>

    <div id="listaStockBajo">

        Cargando...

    </div>

</div>

</button>

</button>

</button>


</div>




</div>



<script src="JS/app.js"></script>

<script type="module" src="JS/dashboard.js"></script>


</body>

</html>
