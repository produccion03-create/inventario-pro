<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Productos</title>

<link rel="stylesheet" href="CSS/style.css">

</head>

<body>

<div class="app">

<h1>📦 Productos</h1>

<input id="codigo" placeholder="Código de barras">

<br><br>

<input id="nombre" placeholder="Nombre producto">

<br><br>

<input id="stock" type="number" placeholder="Stock">

<br><br>

<input id="ubicacion" placeholder="Ubicación">

<br><br>

<input id="precio" type="number" placeholder="Precio">

<br><br>

<button onclick="guardarProducto()">
Guardar Producto
</button>

<h2>Lista de productos</h2>

<input
    type="text"
    id="buscar"
    placeholder="🔍 Buscar por nombre, código o ubicación..."
>


<br><br>

<div id="lista"></div>

<div id="modalEditar" class="modal">

    <div class="modal-contenido">

        <h2>✏️ Editar producto</h2>

        <input type="hidden" id="editarId">

        <input id="editarCodigo" placeholder="Código">

        <br><br>

        <input id="editarNombre" placeholder="Nombre">

        <br><br>

        <input id="editarStock" type="number" placeholder="Stock">

        <br><br>

        <input id="editarUbicacion" placeholder="Ubicación">

        <br><br>

        <input id="editarPrecio" type="number" placeholder="Precio">

        <br><br>

        <button onclick="guardarEdicion()">
            💾 Guardar cambios
        </button>

        <button onclick="cerrarModal()">
            ❌ Cancelar
        </button>

    </div>

</div>

</div>

<script type="module" src="JS/productos.js"></script>

</body>

</html>
